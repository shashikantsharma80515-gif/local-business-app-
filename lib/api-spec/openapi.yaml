openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MediMarket Multi-Vendor Medical Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard stats and data
  - name: stores
    description: Medical store management
  - name: orders
    description: Order management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/otp/send:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerification"
      responses:
        "200":
          description: OTP verified, login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/status:
    patch:
      operationId: updateUserStatus
      tags: [users]
      summary: Activate or deactivate user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /dashboard/customer:
    get:
      operationId: getCustomerDashboard
      tags: [dashboard]
      summary: Customer dashboard stats
      responses:
        "200":
          description: Customer dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDashboard"

  /dashboard/store-owner:
    get:
      operationId: getStoreOwnerDashboard
      tags: [dashboard]
      summary: Store owner dashboard stats
      responses:
        "200":
          description: Store owner dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreOwnerDashboard"

  /dashboard/delivery:
    get:
      operationId: getDeliveryDashboard
      tags: [dashboard]
      summary: Delivery partner dashboard stats
      responses:
        "200":
          description: Delivery dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryDashboard"

  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List medical stores
      parameters:
        - name: verified
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoresListResponse"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a medical store (store owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    get:
      operationId: getStoreById
      tags: [stores]
      summary: Get store by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersListResponse"

  /orders/{id}:
    get:
      operationId: getOrderById
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, store_owner, delivery_partner, admin]
        avatar:
          type: ["string", "null"]
        isActive:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - isActive
        - isVerified
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    UserRegistration:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        role:
          type: string
          enum: [customer, store_owner, delivery_partner, admin]
        storeName:
          type: ["string", "null"]
        storeAddress:
          type: ["string", "null"]
        licenseNumber:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
      required:
        - name
        - email
        - password
        - role

    LoginCredentials:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    PhoneInput:
      type: object
      properties:
        phone:
          type: string
      required:
        - phone

    OtpVerification:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
      required:
        - phone
        - otp
        - role

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    UserStatusUpdate:
      type: object
      properties:
        isActive:
          type: boolean
      required:
        - isActive

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    Store:
      type: object
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        licenseNumber:
          type: ["string", "null"]
        isVerified:
          type: boolean
        isActive:
          type: boolean
        rating:
          type: ["number", "null"]
        totalOrders:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - ownerId
        - name
        - isVerified
        - isActive
        - totalOrders
        - createdAt

    StoreInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        address:
          type: string
        city:
          type: string
        licenseNumber:
          type: string
      required:
        - name

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        licenseNumber:
          type: string

    StoresListResponse:
      type: object
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - stores
        - total
        - page
        - limit

    Order:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        storeId:
          type: integer
        deliveryPartnerId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, confirmed, preparing, out_for_delivery, delivered, cancelled]
        totalAmount:
          type: ["number", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - customerId
        - storeId
        - status
        - createdAt
        - updatedAt

    OrderStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, out_for_delivery, delivered, cancelled]
      required:
        - status

    OrdersListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
      required:
        - orders
        - total
        - page

    CustomerDashboard:
      type: object
      properties:
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        deliveredOrders:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        nearbyStores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
      required:
        - totalOrders
        - activeOrders
        - deliveredOrders
        - recentOrders
        - nearbyStores

    StoreOwnerDashboard:
      type: object
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        completedOrders:
          type: integer
        todayRevenue:
          type: number
        totalRevenue:
          type: number
        store:
          $ref: "#/components/schemas/Store"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - totalOrders
        - pendingOrders
        - completedOrders
        - todayRevenue
        - totalRevenue
        - recentOrders

    DeliveryDashboard:
      type: object
      properties:
        totalDeliveries:
          type: integer
        activeDeliveries:
          type: integer
        completedToday:
          type: integer
        todayEarnings:
          type: number
        totalEarnings:
          type: number
        pendingPickups:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        activeOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - totalDeliveries
        - activeDeliveries
        - completedToday
        - todayEarnings
        - totalEarnings
        - pendingPickups
        - activeOrders

    AdminDashboard:
      type: object
      properties:
        totalUsers:
          type: integer
        totalCustomers:
          type: integer
        totalStoreOwners:
          type: integer
        totalDeliveryPartners:
          type: integer
        totalStores:
          type: integer
        pendingVerifications:
          type: integer
        totalOrders:
          type: integer
        todayOrders:
          type: integer
        totalRevenue:
          type: number
        recentUsers:
          type: array
          items:
            $ref: "#/components/schemas/User"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - totalUsers
        - totalCustomers
        - totalStoreOwners
        - totalDeliveryPartners
        - totalStores
        - pendingVerifications
        - totalOrders
        - todayOrders
        - totalRevenue
        - recentUsers
        - recentOrders
